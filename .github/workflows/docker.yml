on:
  push:
    branches:
      - master

name: Docker Build and Push

jobs:
  publish_docker_image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: lowercase repo owner
        run: echo "OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        env:
          REPO_OWNER: ${{ github.repository_owner }}
      - uses: actions/checkout@v4
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Docker Image
        run: |
          docker build --tag ghcr.io/${{ env.OWNER }}/kintone-emulator:latest \
          --tag ghcr.io/${{ env.OWNER }}/kintone-emulator:$(echo $GITHUB_SHA | head -c7) \
          .
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ env.OWNER }}/kintone-emulator:latest
          docker push ghcr.io/${{ env.OWNER }}/kintone-emulator:$(echo $GITHUB_SHA | head -c7)

# dnsmasq 許可ドメインリスト（制限モード用）
# server=/ドメイン/上流DNS の形式で指定する。
# サブドメインも含めて許可される（例: server=/example.com/1.1.1.1 は *.example.com も許可）。
# 新しいドメインが必要になったら追記して `sudo killall -HUP dnsmasq` で即時反映できる。
# 参考:
# Copilot 許可リスト https://docs.github.com/ja/copilot/reference/copilot-allowlist-reference

# ===== npm =====
server=/npmjs.org/1.1.1.1
server=/npmjs.com/1.1.1.1

# ===== GitHub =====
server=/github.com/1.1.1.1
server=/githubusercontent.com/1.1.1.1
server=/githubassets.com/1.1.1.1

# ===== Claude Code =====
server=/anthropic.com/1.1.1.1
server=/claude.com/1.1.1.1
server=/claude.ai/1.1.1.1
server=/statsig.com/1.1.1.1

# ===== GitHub Copilot =====
server=/githubcopilot.com/1.1.1.1

# ===== VS Code 拡張機能 =====
server=/marketplace.visualstudio.com/1.1.1.1
server=/vscode-cdn.net/1.1.1.1
server=/vsassets.io/1.1.1.1
server=/vscode.blob.core.windows.net/1.1.1.1
server=/update.code.visualstudio.com/1.1.1.1
server=/azure.cn/1.1.1.1

# ===== JSON スキーマ =====
server=/schemastore.org/1.1.1.1

# ===== TLS 証明書失効確認 =====
server=/digicert.com/1.1.1.1
server=/microsoft.com/1.1.1.1

# ===== kintone =====
server=/cybozu.com/1.1.1.1
server=/kintone.com/1.1.1.1
server=/cybozu.dev/1.1.1.1
server=/kintone.help/1.1.1.1

# ===== Documents =====
server=/vitest.dev/1.1.1.1

# ===== それ以外はすべてブロック =====
address=/#/

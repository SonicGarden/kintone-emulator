# dnsmasq 制限モード設定
# allowed-domains.conf に記載されたドメインのみ解決する。
# それ以外は address=/#/ により NXDOMAIN を返す。

log-queries
log-facility=/var/log/dnsmasq.log

# 許可リストを読み込む（末尾の address=/#/ でそれ以外をブロック）
conf-file=/workspace/.devcontainer/allowed-domains.conf

# /etc/resolv.conf は使わない（allowed-domains.conf の server= エントリで上流を指定）
no-resolv

cache-size=1000
